<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Arşivi Yönetimi</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      background-color: #e8eef7;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background-color: #2c3e6b;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    header a {
      color: #fff;
      text-decoration: none;
      background-color: #e67e22;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.15s;
    }
    header a:hover {
      background-color: #d35400;
      transform: translateY(-1px);
    }
    header a:visited {
      color: #fff;
    }
    p {
      text-align: center;
      font-size: 1.3rem;
      color: #7f8c8d;
      margin-top: 60px;
    }
  </style>
  <body>
    <header>
      <a href="/">Ana Sayfa</a>
      <a href="/films">Tüm Filmler</a>
      <a href="/api/films" target="_blank">Tüm Filmler API</a>
      <a href="/api/stats" target="_blank">İstatistikler API</a>
      <a href="/reports/export" target="_blank">Export Report</a>
    </header>
    <p>Page Not Found...</p>
  </body>
</html>
