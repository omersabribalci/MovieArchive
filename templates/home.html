<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Arşivi Yönetimi</title>
  </head>
  <style>
    body {
      box-sizing: border-box;
      margin: 0 auto;
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      background-color: rgb(143, 176, 237);
      display: flex;
      justify-content: center;
      flex-direction: column;
    }
    header {
      padding: 20px;
      margin: 0 auto;
      display: inline-flex;
      flex-direction: row;
      gap: 10px;
      justify-content: center;
      background-color: rgb(56, 110, 210, 0.7);
      border-radius: 50px;
      width: auto;
    }
    a {
      color: black;
      text-decoration: none;
      background-color: darkorange;
      padding: 7px 12px;
      border-radius: 15px;
      white-space: nowrap;
    }
    a:visited {
      color: black;
    }
    main {
      display: flex;
      flex-direction: column;
      margin: 0 auto;
    }
    h1 {
      margin-top: 20px;
      margin-bottom: 0;
    }
    h2 {
      padding: 10px 0;
      margin: 0;
    }

    ul {
      padding: 10px 0;
      margin: 0;
    }
    li {
      padding: 0;
      margin: 0;
      list-style: none;
      line-height: 30px;
    }
  </style>
  <body>
    <header>
      <a href="/">Ana Sayfa</a>
      <a href="/films">Tüm Filmler</a>
      <a href="/api/films" target="_blank">Tüm Filmler API</a>
      <a href="/api/stats" target="_blank">İstatistikler API</a>
      <a href="/reports/export" target="_blank">Export Report</a>
    </header>
    <main>
      <h1>{{title}}</h1>
      <div class="wrapper">
        <p>Toplam Film: <span>{{totalfilmCount}}</span></p>
        <p>
          İzlenen: <span>{{watchedCount}}</span> | İzlenmeyen:
          <span>{{notWatchedCount}}</span>
        </p>
        <p>Ortalama Puan: ⭐ <span>{{averageRating}}</span></p>
        <h2>Son Eklenenler:</h2>
        {{lastAddedList}}
      </div>
    </main>
  </body>
</html>
