<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Arşivi Yönetimi</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      background-color: #e8eef7;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background-color: #2c3e6b;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    header a {
      color: #fff;
      text-decoration: none;
      background-color: #e67e22;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.15s;
    }
    header a:hover {
      background-color: #d35400;
      transform: translateY(-1px);
    }
    header a:visited {
      color: #fff;
    }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* Page title */
    h1 {
      text-align: center;
      margin: 0 0 6px 0;
      font-size: 1.6rem;
      color: #2c3e6b;
    }
    h1::before {
      content: "🎬 ";
    }

    /* Wrapper card */
    .wrapper {
      background-color: #fff;
      border-radius: 14px;
      padding: 24px 28px;
      box-shadow: 0 2px 16px rgba(44, 62, 107, 0.1);
    }

    /* Stat paragraphs as inline cards */
    .wrapper > p {
      margin: 0;
      padding: 12px 16px;
      background-color: #f4f7fb;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
      border-left: 3px solid #e67e22;
      margin-bottom: 10px;
      color: #34495e;
    }
    .wrapper > p:last-of-type {
      margin-bottom: 18px;
    }
    span {
      font-weight: 700;
      color: #2c3e6b;
    }

    /* Section heading */
    h2 {
      padding: 0 0 6px 0;
      margin: 0 0 8px 0;
      font-size: 1.05rem;
      color: #2c3e6b;
      border-bottom: 2px solid #e67e22;
      display: inline-block;
    }
    h2::before {
      content: "🕐 ";
    }

    /* Last added list */
    ul {
      padding: 6px 0 0 0;
      margin: 0;
    }
    li {
      padding: 8px 14px;
      margin: 0 0 6px 0;
      list-style: none;
      line-height: 1.4;
      font-size: 0.9rem;
      background-color: #f9fafb;
      border-radius: 8px;
      color: #34495e;
      transition: background-color 0.2s, transform 0.15s;
      border-left: 3px solid #2c3e6b;
    }
    li:hover {
      background-color: #eef2f7;
      transform: translateX(3px);
    }
    li a {
      color: #2c3e6b;
      text-decoration: none;
      transition: color 0.2s;
    }
    li a:hover {
      color: #e67e22;
    }
    li a:visited {
      color: #2c3e6b;
    }
  </style>
  <body>
    <header>
      <a href="/">Ana Sayfa</a>
      <a href="/films">Tüm Filmler</a>
      <a href="/api/films" target="_blank">Tüm Filmler API</a>
      <a href="/api/stats" target="_blank">İstatistikler API</a>
      <a href="/reports/export" target="_blank">Export Report</a>
    </header>
    <main>
      <h1>{{title}}</h1>
      <div class="wrapper">
        <p>Toplam Film: <span>{{totalfilmCount}}</span></p>
        <p>
          İzlenen: <span>{{watchedCount}}</span> | İzlenmeyen:
          <span>{{notWatchedCount}}</span>
        </p>
        <p>Ortalama Puan: ⭐ <span>{{averageRating}}</span></p>
        <h2>Son Eklenenler:</h2>
        {{lastAddedList}}
      </div>
    </main>
  </body>
</html>
