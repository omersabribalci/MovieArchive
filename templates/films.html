<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Arşivi Yönetimi</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      background-color: #e8eef7;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background-color: #2c3e6b;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    header a {
      color: #fff;
      text-decoration: none;
      background-color: #e67e22;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.9rem;
      font-weight: 600;
      transition:
        background-color 0.2s,
        transform 0.15s;
    }
    header a:hover {
      background-color: #d35400;
      transform: translateY(-1px);
    }
    header a:visited {
      color: #fff;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 1.8rem;
      color: #2c3e6b;
    }
    /* Filter section — flush, no card */
    .filter {
      background: none;
      border-radius: 0;
      padding: 0 0 24px 0;
      margin-bottom: 24px;
      box-shadow: none;
      text-align: center;
      border-bottom: 1px solid #d5dde8;
    }

    /* Title with decorative side lines */
    .filter p {
      margin: 0 0 14px 0;
      font-weight: 600;
      font-size: 0.8rem;
      color: #8e99a9;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .filter p::before,
    .filter p::after {
      content: "";
      height: 1px;
      width: 50px;
      background: linear-gradient(90deg, transparent, #b0bec5, transparent);
    }

    /* Pill container — centered segmented bar */
    .select-cat {
      display: inline-flex;
      flex-wrap: nowrap;
      gap: 0;
      background-color: #2c3e6b;
      border-radius: 28px;
      padding: 4px;
      justify-content: center;
    }
    ul {
      padding: 0;
      margin: 0;
    }
    li {
      list-style: none;
    }

    /* Category links — transparent pills inside the bar */
    .select-cat a {
      text-decoration: none;
      display: block;
    }
    .select-cat li {
      display: block;
      padding: 8px 18px;
      background-color: transparent;
      color: rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .select-cat a:first-child li {
      background-color: #e67e22;
      color: #fff;
    }
    .select-cat li:hover {
      background-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .select-cat a:first-child li:hover {
      background-color: #d35400;
    }
    .film-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }
    .film {
      background-color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .film:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(44, 62, 107, 0.18);
    }

    /* Poster / Image */
    .film img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background-color: #c8d6e5;
      border-bottom: 3px solid #e67e22;
      display: block;
    }

    .film-info {
      padding: 16px 16px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .film-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #2c3e6b;
      line-height: 1.3;
      text-align: left;
    }

    .film-year {
      font-size: 0.85rem;
      color: #7f8c8d;
      font-weight: 500;
      margin-left: 6px;
    }

    .film-rating {
      font-size: 0.95rem;
      color: #e67e22;
      font-weight: 700;
      white-space: nowrap;
      background-color: #fdf3e9;
      padding: 4px 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
    }

    /* Detail link */
    .film > a {
      display: block;
      margin: auto 16px 14px;
      padding: 10px 0;
      background-color: #2c3e6b;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 8px;
      transition: background-color 0.2s;
    }
    .film > a:hover {
      background-color: #1a2a4a;
    }
    .film > a:visited {
      color: #fff;
    }

    /* Search and Sort Forms */
    .search-sort-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .search-form {
      display: flex;
      align-items: center;
    }
    .search-form input {
      padding: 10px 16px;
      border: 1px solid #c8d6e5;
      border-radius: 20px 0 0 20px;
      outline: none;
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      min-width: 200px;
    }
    .search-form input:focus {
      border-color: #2c3e6b;
    }
    .search-form button {
      padding: 10px 16px;
      background-color: #2c3e6b;
      color: #fff;
      border: none;
      border-radius: 0 20px 20px 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background-color 0.2s;
    }
    .search-form button:hover {
      background-color: #1a2a4a;
    }
    .sort-form button {
      padding: 10px 16px;
      background-color: #e67e22;
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background-color 0.2s, transform 0.15s;
    }
    .sort-form button:hover {
      background-color: #d35400;
      transform: translateY(-1px);
    }
  </style>
  <body>
    <header>
      <a href="/">Ana Sayfa</a>
      <a href="/films">Tüm Filmler</a>
      <a href="/api/films" target="_blank">Tüm Filmler API</a>
      <a href="/api/stats" target="_blank">İstatistikler API</a>
      <a href="/reports/export" target="_blank">Export Report</a>
    </header>
    <main>
      <h1>{{title}}</h1>
      <div class="filter">
        <p>Kategori Seçiniz...</p>
        <ul class="select-cat">
          {{categoryLinks}}
        </ul>
        <div class="search-sort-container">
          <form action="/films/search" class="search-form">
            <input type="text" name="q" id="q" placeholder="Film Ara..." required />
            <button type="submit">Ara</button>
          </form>
          <form action="/films" class="sort-form">
            <button type="submit" id="sort" name="sort" value="rating">
              ⭐ En İyiler
            </button>
          </form>
        </div>
      </div>

      <div class="film-wrapper">{{content}}</div>
    </main>
  </body>
</html>
