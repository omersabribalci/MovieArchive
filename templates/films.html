<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
  </head>
  <style>
    body {
      box-sizing: border-box;
      margin: 0 auto;
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
    }
    header {
      padding: 20px;
      margin: 0 auto;
    }
    h1 {
      padding: 20px;
      margin: 0 auto;
    }
    .film-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      text-align: center;
      gap: 20px;
      padding: 20px;
    }
    .film {
      padding: 5px;
      border: 1px solid black;
      border-radius: 10px;
    }
    img {
      width: 100%;
      height: 300px;
      border-radius: 5px;
      background-color: gainsboro;
    }
    a {
      color: black;
      text-decoration: none;
    }
    a:visited {
      color: black;
    }
    .filter {
      padding: 20px;
    }
    .select-cat {
      display: flex;
      flex-direction: row;
      gap: 4rem;
    }
    ul {
      padding: 0;
    }
    li {
      list-style: none;
      padding: 5px 10px;
      background-color: coral;
      border-radius: 15px;
    }
  </style>
  <body>
    <header>
      <a href="/">Ana Sayfa</a>
      <a href="/films">Tüm Filmler</a>
      <a href="/api/films" target="_blank">Tüm Filmler API</a>
      <a href="/api/stats" target="_blank">İstatistikler API</a>
      <a href="/reports/export" target="_blank">Export Report</a>
    </header>
    <h1>{{title}}</h1>
    <div class="filter">
      <p>Kategori Seçiniz...</p>
      <ul class="select-cat">
        {{categoryLinks}}
      </ul>
    </div>

    <div class="film-wrapper">{{content}}</div>
  </body>
</html>
