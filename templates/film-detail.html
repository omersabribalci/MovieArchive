<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Arşivi Yönetimi</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family:
        "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      background-color: #e8eef7;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background-color: #2c3e6b;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    header a {
      color: #fff;
      text-decoration: none;
      background-color: #e67e22;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.15s;
    }
    header a:hover {
      background-color: #d35400;
      transform: translateY(-1px);
    }
    header a:visited {
      color: #fff;
    }
    .wrapper {
      max-width: 420px;
      margin: 30px auto;
      padding: 0;
      background-color: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(44, 62, 107, 0.12);
      overflow: hidden;
    }

    /* Poster */
    .wrapper img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background-color: #c8d6e5;
    }

    /* Content area — all divs inside wrapper */
    .wrapper > div {
      padding: 3px 22px;
      line-height: 1.4;
    }

    /* Title (1st div) */
    .wrapper > div:nth-child(2) {
      font-size: 1.25rem;
      font-weight: 700;
      color: #2c3e6b;
      padding-top: 16px;
      padding-bottom: 2px;
    }

    /* Director (2nd div) */
    .wrapper > div:nth-child(3) {
      font-size: 0.85rem;
      color: #7f8c8d;
      padding-bottom: 10px;
      border-bottom: 1px solid #ecf0f1;
    }
    .wrapper > div:nth-child(3)::before {
      content: "🎬 Yönetmen: ";
      font-weight: 600;
      color: #34495e;
    }

    /* Year (3rd div) */
    .wrapper > div:nth-child(4) {
      font-size: 0.85rem;
      color: #555;
      padding-top: 10px;
    }
    .wrapper > div:nth-child(4)::before {
      content: "📅 Yıl: ";
      font-weight: 600;
      color: #34495e;
    }

    /* Rating (4th div) */
    .wrapper > div:nth-child(5) {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e67e22;
    }
    .wrapper > div:nth-child(5)::before {
      content: "⭐ Puan: ";
    }

    /* Category (5th div) */
    .wrapper > div:nth-child(6) {
      padding-top: 10px;
      padding-bottom: 6px;
    }
    .wrapper > div:nth-child(6)::before {
      content: "📂 Kategori: ";
      font-weight: 600;
      color: #34495e;
    }

    /* Watched status (6th div) */
    .wrapper > div:nth-child(7) {
      display: inline-block;
      margin: 8px 22px 18px;
      padding: 6px 16px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 0.8rem;
      background-color: #2c3e6b;
      color: #fff;
    }

    a {
      color: #2c3e6b;
      text-decoration: none;
    }
    a:visited {
      color: #2c3e6b;
    }
  </style>
  <body>
    <header>
      <a href="/">Ana Sayfa</a>
      <a href="/films">Tüm Filmler</a>
      <a href="/api/films" target="_blank">Tüm Filmler API</a>
      <a href="/api/stats" target="_blank">İstatistikler API</a>
      <a href="/reports/export" target="_blank">Export Report</a>
    </header>
    <div class="wrapper">{{content}}</div>
  </body>
</html>
