<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Arşivi Yönetimi</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      background-color: #e8eef7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a2e;
    }
    .success-card {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(44, 62, 107, 0.1);
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
    }
    p {
      font-size: 1.15rem;
      font-weight: 600;
      color: #2c3e6b;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      background-color: #e67e22;
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background-color 0.2s, transform 0.15s;
    }
    a:hover {
      background-color: #d35400;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="success-card">
    <span class="icon">✅</span>
    <p>Rapor <strong>reports</strong> klasörüne başarıyla oluşturuldu.</p>
    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
